<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setor Montagem | TurboSul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-turbo-teal { background-color: #0D9488; }
        .text-turbo-teal { color: #0D9488; }
        .border-turbo-teal { border-color: #0D9488; }
        .bg-turbo-blue { background-color: #2563EB; }
        .bg-turbo-orange { background-color: #EA580C; }
        .os-card-selected { border-left: 4px solid #2563EB !important; background-color: #f0f9ff !important; }
        .tab-active { border-bottom: 2px solid #0D9488; color: #0D9488; font-weight: 800; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen overflow-hidden">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between sticky top-0 z-40 shadow-sm">
        <div class="flex items-center space-x-4">
            <img src="https://i.postimg.cc/Jh5Jvrc9/IMG-7901.png" alt="TurboSul Logo" class="h-10">
            <div>
                <h1 class="text-lg font-bold tracking-tight text-slate-900 uppercase">TurboSul - Controle de Produção</h1>
                <p class="text-xs text-slate-500 font-medium italic">Setor de Montagem e Finalização</p>
            </div>
        </div>
        <div class="flex items-center space-x-6">
            <div class="text-right border-l pl-6 border-slate-200">
                <p class="text-sm font-bold leading-none">Administrador</p>
                <p class="text-[10px] text-turbo-teal font-black uppercase tracking-wider">Montagem</p>
            </div>
            <button class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md text-sm font-bold transition">Sair</button>
        </div>
    </header>

    <div class="flex h-[calc(100vh-64px)]">
        <!-- SIDEBAR -->
        <aside class="w-80 bg-white border-r border-slate-200 overflow-y-auto flex-shrink-0">
            <div class="p-4 border-b border-slate-100 bg-slate-50 sticky top-0 z-10 flex justify-between items-center">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-400 italic">Fila de Montagem</h2>
                <button onclick="fetchQueue()" class="text-turbo-teal hover:rotate-180 transition-all duration-500"><i class="fa-solid fa-rotate-right"></i></button>
            </div>
            <div id="os-list" class="p-4 space-y-3">
                <div class="p-8 text-center text-slate-400 text-xs italic animate-pulse">Carregando fila...</div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50 custom-scroll">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-slate-400">
                <i class="fa-solid fa-box-open text-6xl mb-4 opacity-10"></i>
                <p class="uppercase tracking-widest font-bold text-sm">Selecione uma OS para Iniciar</p>
            </div>

            <div id="main-workspace" class="hidden space-y-6">
                <!-- TOP INFO -->
                <div class="flex flex-col lg:flex-row justify-between gap-6">
                    <div class="bg-turbo-teal rounded-3xl shadow-lg text-white p-6 min-h-[140px] flex-1 flex flex-col justify-center relative overflow-hidden">
                        <div class="relative z-10 ml-4">
                            <!-- CORREÇÃO 1: IDs para popular dados da OS -->
                            <h2 id="display-os" class="text-3xl font-black mb-1 italic tracking-tighter uppercase">OS-XXXX</h2>
                            <p id="display-desc" class="text-sm font-medium opacity-90 uppercase tracking-widest italic">CLIENTE | MODELO</p>
                        </div>
                        <i class="fa-solid fa-screwdriver-wrench absolute right-[-20px] bottom-[-20px] text-white opacity-10 text-9xl"></i>
                    </div>

                    <div class="bg-slate-900 text-white rounded-3xl p-6 flex flex-col justify-between border-b-4 border-turbo-teal lg:w-80 shadow-xl">
                        <div class="flex items-center space-x-3">
                            <div class="p-2 bg-turbo-teal/20 rounded-xl text-turbo-teal"><i class="fa-solid fa-clock text-xl"></i></div>
                            <div><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Produtividade</p><p class="text-xs font-black text-white uppercase">Montagem Ativa</p></div>
                        </div>
                        <button class="mt-4 w-full bg-turbo-teal hover:bg-teal-700 text-white py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest transition shadow-lg">Iniciar Limpeza Setor</button>
                    </div>
                </div>

                <!-- CHECKLISTS (ABAS) -->
                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-4 border-b bg-slate-50 flex space-x-8 overflow-x-auto">
                        <button onclick="switchTab(this, 'tab1')" class="tab-button tab-active py-2 text-[10px] font-black uppercase tracking-widest whitespace-nowrap">1. Anexos (Itens Externos)</button>
                        <button onclick="switchTab(this, 'tab2')" class="tab-button text-slate-400 py-2 text-[10px] font-black uppercase tracking-widest whitespace-nowrap">2. Reparos Gerais</button>
                        <button onclick="switchTab(this, 'tab3')" class="tab-button text-slate-400 py-2 text-[10px] font-black uppercase tracking-widest whitespace-nowrap">3. Caracol (Caixa Quente)</button>
                        <button onclick="switchTab(this, 'tab4')" class="tab-button text-slate-400 py-2 text-[10px] font-black uppercase tracking-widest whitespace-nowrap">4. Balanceamento e Finalização</button>
                    </div>
                    <div class="p-6 max-h-[500px] overflow-y-auto custom-scroll">
                        <!-- CORREÇÃO 2: Contêineres de conteúdo das abas -->
                        <div id="tab1" class="tab-content space-y-1"></div>
                        <div id="tab2" class="tab-content hidden space-y-1"></div>
                        <div id="tab3" class="tab-content hidden space-y-1"></div>
                        <div id="tab4" class="tab-content hidden space-y-3">
                            <!-- O conteúdo agora será gerado inteiramente pelo JavaScript -->
                        </div>
                    </div>
                </div>

                <!-- MONITOR DE COMPONENTES E PENDÊNCIAS -->
                <div class="space-y-6 pt-6 border-t border-slate-200">
                    
                    <!-- Botão de Alerta de Peças Pendentes -->
                    <div>
                        <button id="toggle-pending-btn" onclick="togglePendingView()" class="w-full flex justify-between items-center bg-amber-100 text-amber-800 p-4 rounded-2xl border-2 border-amber-200 hover:bg-amber-200/60 transition shadow-sm">
                            <div class="flex items-center gap-3">
                                <i class="fa-solid fa-triangle-exclamation"></i>
                                <span class="text-xs font-black uppercase tracking-wider">Monitor de Peças Pendentes</span>
                            </div>
                            <span id="pending-count-badge" class="px-3 py-1 bg-amber-500 text-white text-xs font-black rounded-full">0</span>
                        </button>
                        <div id="pending-parts-list" class="hidden mt-3 bg-white p-4 rounded-2xl border border-slate-200 space-y-2 max-h-48 overflow-y-auto custom-scroll">
                            <!-- Lista de peças pendentes será inserida aqui -->
                        </div>
                    </div>

                    <!-- Painel de Ação de Montagem -->
                    <div>
                         <h3 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-4 ml-2 italic">Componentes Liberados para Montagem:</h3>
                         <div id="assembly-grid" class="space-y-4 pb-32"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- BOTÃO GLOBAL FINAL -->
    <div id="footer-actions" class="fixed bottom-0 right-0 p-8 z-30 hidden">
        <!-- CORREÇÃO 3: Botão inicia desabilitado pela Trava de Segurança -->
        <button id="btn-finalize-os" onclick="handleFinalizeOS()" class="bg-turbo-orange hover:bg-orange-700 text-white px-12 py-5 rounded-3xl font-black uppercase tracking-[0.2em] text-sm shadow-2xl transition-all transform hover:-translate-y-1">
            Concluir Montagem e Liberar Turbina
        </button>
    </div>

    <script>
        // URLs e Variáveis Globais
        const API_QUEUE = 'https://webhook.mareflow.com.br/webhook/production/assembly-queue';
        const API_ACTION = 'https://webhook.mareflow.com.br/webhook/production/assembly-action';
        let selectedOS = null;
        let queueData = [];

        // DOSSIÊ MESTRE: Banco de Itens Sincronizado
        const ANALYSIS_ITEMS = {
            'tab1': ['Travas CCO', 'Travas CT', 'Parafuso CT Flangeado', 'Parafuso CCO Flangeado', 'Cano Retorno Parafusos', 'Adaptador Lubrificação', 'Nipel de Lubrificação', 'Cano Lubrificação com Nipel', 'Atuador Pressão', 'Atuador Vácuo', 'Atuador Vácuo Eletrônico', 'Atuador Eletrônico com Haste', 'Suporte Atuador Eletrônico', 'Calço Atuador', 'Chapa de Proteção Atuador', 'Parafusos Suporte Atuador', 'Parafusos Chapa Proteção', 'Mangueira na CCO', 'Prisioneiro Saída', 'Prisioneiro Pé Mesa CT', 'Prisioneiro CCE', 'Parafuso CCE', 'Prisioneiro CCO', 'Prisioneiro Especial Longo', 'Saída de Escape', 'Flange Saída CT', 'Chapa de Proteção CT', 'Freio Motor', 'Chapa de Proteção Saída', 'Nipel Fixo na CCO', 'Nipel Roscado na CCO', 'Nipel com Parafuso OCO', 'Olhal', 'Parafuso OCO', 'Coletor', 'Cinta CT CCE', 'Cinta CCO', 'Cinta Saída', 'Flange Pé Mesa CT', 'Cano Admissão CCO', 'Cano Admissão Motor', 'Cano de Água', 'Valvula Prioritária', 'Valvula Solenóide', 'Sonda Temp Pressão', 'Sensor PVF', 'Bocal Plástico Biturbo', 'Tampão CT', 'Arruela Plástica Biturbo', 'Bocal Alumínio Biturbo', 'Luva Borracha Biturbo', 'Cano Ligação Alumínio', 'Capa Alumínio Biturbo', 'Peça Alumínio com Mola', 'Juntas', 'Almofada Amianto Saída', 'Mangueira Atuador', 'Conexão T', 'Defletor Admissão com Trava', 'Abraçadeiras', 'Capa Protetiva Alumínio', 'Nipel de Retorno', 'Mangueira de Retorno', 'Suporte CT', 'Anel Cano Retorno', 'Parafuso União Biturbo', 'Valvula Pressão Partida', 'Oring', 'Valvula Sensor Partida', 'Mangueira Bocal Alumínio'],
            'tab2': ['Mancal Radial', 'Mancal Encosto', 'Flange', 'Colar', 'Espaçador', 'Calço Arruela', 'Defletor de Óleo', 'Protetor Térmico', 'Travas de Mancal CCE', 'Trava Aranha Mancal', 'Trava de Flange', 'Calço de Altura no Rotor', 'Porca do Eixo', 'Almofada Vedação Eixo', 'Almofada Vedação Caracol', 'Arruela Metálica Vedação', 'Geometria Variável TGV', 'Flange da TGV', 'Viton', 'Aneis Vedação Flange TGV', 'Anel Assentamento Valvula Biturbo'],
            'tab3': ['Trinca Base Face ou Gases', 'Quebra Base Face', 'Espessura da Base Minima 9mm', 'Embuchamento da CT', 'Desgaste Saida Escape Flangeada', 'Desgaste Face Encaixe CCE', 'Trinca Face Assentamento CCE', 'Trinca Parede Lateral Protetor', 'Trinca ou Quebra da Voluta', 'Borboleta ou Moeda Folga', 'Bucha Guia Borboleta', 'Braco Wastegate', 'Pino de Centro', 'Assentamento Borboleta Moeda', 'Coletor Anexo', 'Plaina Coletor Uniao Biturbo', 'Empenamento Faces Alojamento', 'Necessita Gabarito Usinagem', 'Tipo de Solda'],
            'tab4': ['Balan. Eixo Horário', 'Polim. Eixo Horário', 'Balanc. Rotores']
        };

        // INICIALIZAÇÃO
        document.addEventListener('DOMContentLoaded', fetchQueue);

        // FUNÇÕES PRINCIPAIS
        async function fetchQueue() {
            try {
                const response = await fetch(API_QUEUE);
                const data = await response.json();
                queueData = Array.isArray(data) ? data : (data.data || []);
                renderSidebar();
            } catch (e) { console.error("Erro na Fila:", e); }
        }

        function renderSidebar() {
            const list = document.getElementById('os-list');
            if (queueData.length === 0) {
                list.innerHTML = '<div class="p-8 text-center text-slate-400 text-xs italic">Fila de Montagem Vazia.</div>';
                return;
            }
            list.innerHTML = queueData.map(os => `
                <div id="os-card-${os.os_id}" onclick="selectOS('${os.os_id}')" class="os-card p-4 cursor-pointer bg-white border-l-4 border-transparent hover:bg-slate-50 transition rounded-xl shadow-sm">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-sm font-black text-slate-900">${os.business_id}</span>
                        <span class="px-2 py-0.5 text-[9px] font-black uppercase rounded-md bg-blue-100 text-blue-600">${os.urgency || 'Normal'}</span>
                    </div>
                    <p class="text-xs font-bold text-slate-700 uppercase mb-1">${os.model}</p>
                    <p class="text-[10px] font-medium text-slate-500 uppercase truncate">${os.client}</p>
                </div>
            `).join('');
        }

        function selectOS(id) {
            selectedOS = queueData.find(o => o.os_id === id);
            
            document.querySelectorAll('.os-card').forEach(c => c.classList.remove('os-card-selected'));
            document.getElementById(`os-card-${id}`).classList.add('os-card-selected');

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('main-workspace').classList.remove('hidden');
            document.getElementById('footer-actions').classList.remove('hidden');
            
            document.getElementById('display-os').innerText = selectedOS.business_id;
            document.getElementById('display-desc').innerText = `${selectedOS.client} | ${selectedOS.model}`;
            
            // Chamadas para renderizar todos os elementos da nova arquitetura
            renderChecklists();
            renderAssemblyGrid();
            renderPendingParts();
            checkOverallStatus();
        }

        function renderChecklists() {
            Object.keys(ANALYSIS_ITEMS).forEach(tabId => {
                const isBalanceTab = tabId === 'tab4';
                const container = document.getElementById(tabId);
                if (!container) return;

                let html = '';
                if (isBalanceTab) {
                    // Mapeamento fixo para os campos que o n8n espera
                    const fieldMap = {
                        'Balan. Eixo Horário': 'montagem_conjunto',
                        'Polim. Eixo Horário': 'polimento_eixo',
                        'Balanc. Rotores': 'obs_gerais'
                    };

                    html = ANALYSIS_ITEMS[tabId].map(item => `
                        <div class="grid grid-cols-12 gap-4 items-center bg-white p-3 border border-slate-200 rounded-2xl shadow-sm">
                            <div class="col-span-12 md:col-span-5">
                                <label class="flex items-center cursor-pointer group">
                                    <input type="checkbox" class="w-5 h-5 text-turbo-teal border-slate-300 rounded focus:ring-turbo-teal">
                                    <span class="ml-4 text-xs font-black text-slate-600 uppercase group-hover:text-turbo-teal transition">${item}</span>
                                </label>
                            </div>
                            <div class="col-span-12 md:col-span-7">
                                <input type="text" data-field="${fieldMap[item] || 'extra'}" placeholder="Observações para ${item}..." class="balance-input w-full bg-slate-100 text-slate-600 text-sm rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-turbo-teal border border-transparent">
                            </div>
                        </div>
                    `).join('');
                } else {
                    html = ANALYSIS_ITEMS[tabId].map(item => `
                        <div class="grid grid-cols-12 gap-3 items-center bg-white p-2 border-b border-slate-50 hover:bg-slate-50 transition">
                            <div class="col-span-5 text-[10px] font-bold text-slate-600 uppercase tracking-tighter ml-2">${item}</div>
                            <div class="col-span-3">
                                <select onchange="updateSelectColor(this)" class="w-full bg-slate-400 text-white text-[9px] font-black py-2 rounded-lg uppercase text-center outline-none">
                                    <option value="NÃO INFORMADO">NÃO INFORMADO</option>
                                    <option value="PEÇA OK">PEÇA OK</option>
                                    <option value="RECONDICIONAR">RECONDICIONAR</option>
                                    <option value="TROCAR">TROCAR</option>
                                </select>
                            </div>
                            <div class="col-span-4"><input type="text" placeholder="Obs..." class="w-full bg-slate-100 text-slate-500 text-[10px] rounded-lg px-3 py-1.5 outline-none focus:ring-1 focus:ring-turbo-teal border border-transparent"></div>
                        </div>`).join('');
                }
                container.innerHTML = html;
            });
        }
                    html = ANALYSIS_ITEMS[tabId].map(item => `
                        <div class="grid grid-cols-12 gap-3 items-center bg-white p-2 border-b border-slate-50 hover:bg-slate-50 transition">
                            <div class="col-span-5 text-[10px] font-bold text-slate-600 uppercase tracking-tighter ml-2">${item}</div>
                            <div class="col-span-3">
                                <select onchange="updateSelectColor(this)" class="w-full bg-slate-400 text-white text-[9px] font-black py-2 rounded-lg uppercase text-center outline-none">
                                    <option value="NÃO INFORMADO">NÃO INFORMADO</option>
                                    <option value="PEÇA OK">PEÇA OK</option>
                                    <option value="RECONDICIONAR">RECONDICIONAR</option>
                                    <option value="TROCAR">TROCAR</option>
                                </select>
                            </div>
                            <div class="col-span-4"><input type="text" placeholder="Obs..." class="w-full bg-slate-100 text-slate-500 text-[10px] rounded-lg px-3 py-1.5 outline-none focus:ring-1 focus:ring-turbo-teal border border-transparent"></div>
                        </div>`).join('');
                }
                container.innerHTML = html;
            });
        }

function renderAssemblyGrid() {
            const grid = document.getElementById('assembly-grid');
            const pieces = (selectedOS.components_to_render || []);

            if (pieces.length === 0) {
                grid.innerHTML = '<div class="p-10 border-2 border-dashed border-slate-200 rounded-3xl text-center"><p class="text-slate-400 font-bold uppercase text-xs italic tracking-widest">Nenhum componente liberado para esta OS.</p></div>';
                return;
            }

            grid.innerHTML = pieces.map(componentName => `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 space-y-3 md:space-y-0 md:flex md:items-center md:justify-between md:gap-4" id="row-comp-${componentName}">
                    <h4 class="text-base font-black text-slate-800 uppercase tracking-tighter md:w-32">${componentName}</h4>
                    <div class="flex-1">
                        <input id="obs-comp-${componentName}" oninput="validateComponentAction(this, '${componentName}')" type="text" placeholder="Adicionar observação para iniciar..." class="w-full bg-slate-50 text-sm rounded-lg px-4 py-3 outline-none focus:ring-2 focus:ring-turbo-blue border border-slate-200 transition">
                    </div>
                    <div class="flex gap-2 md:w-48">
                        <button id="btn-start-${componentName}" disabled onclick="pieceAction('${componentName}', 'START')" class="w-full bg-turbo-blue/50 text-white px-4 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest transition cursor-not-allowed">INICIAR</button>
                        <button id="btn-finish-${componentName}" onclick="pieceAction('${componentName}', 'FINISH')" class="hidden w-full bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest transition shadow-md">FINALIZAR</button>
                    </div>
                </div>
            `).join('');
        }

        function validateComponentAction(inputElement, componentName) {
            const startButton = document.getElementById(`btn-start-${componentName}`);
            if (inputElement.value.trim().length > 0) {
                startButton.disabled = false;
                startButton.classList.remove('bg-turbo-blue/50', 'cursor-not-allowed');
                startButton.classList.add('bg-turbo-blue', 'hover:bg-blue-700', 'shadow-md');
            } else {
                startButton.disabled = true;
                startButton.classList.add('bg-turbo-blue/50', 'cursor-not-allowed');
                startButton.classList.remove('bg-turbo-blue', 'hover:bg-blue-700', 'shadow-md');
            }
        }

        async function pieceAction(component, action) {
            const obs = (action === 'START') ? document.getElementById(`obs-comp-${component}`).value : '';
            const startBtn = document.getElementById(`btn-start-${component}`);
            const finishBtn = document.getElementById(`btn-finish-${component}`);
            const row = document.getElementById(`row-comp-${component}`);
            const inputField = document.getElementById(`obs-comp-${component}`);

            const buttonToDisable = (action === 'START') ? startBtn : finishBtn;
            buttonToDisable.disabled = true;

            try {
                const res = await fetch(API_ACTION, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ os_id: selectedOS.os_id, component, action, observation: obs })
                });
                if(res.ok) {
                    if(action === 'START') {
                        startBtn.classList.add('hidden');
                        finishBtn.classList.remove('hidden');
                        // Trava o input após iniciar
                        inputField.disabled = true;
                        inputField.classList.add('bg-slate-100', 'text-slate-400');
                    } else {
                        row.classList.add('opacity-40', 'grayscale', 'pointer-events-none');
                        finishBtn.innerHTML = 'CONCLUÍDO';
                    }
                }
            } catch (e) { alert("Erro ao comunicar com o servidor."); }
             finally { buttonToDisable.disabled = false; }
        }

        function renderPendingParts() {
            const container = document.getElementById('pending-parts-list');
            const badge = document.getElementById('pending-count-badge');
            const pendingItems = (selectedOS.analise_previa || []).filter(item => item.veredito === 'TROCAR');

            badge.textContent = pendingItems.length;

            if (pendingItems.length > 0) {
                container.innerHTML = pendingItems.map(item => `
                    <div class="flex items-center p-2 bg-slate-50 rounded-lg border border-slate-100">
                        <i class="fa-solid fa-clock-rotate-left text-slate-400 mr-3"></i>
                        <span class="text-xs font-bold text-slate-600 uppercase tracking-tight">${item.item}</span>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p class="text-xs text-center italic text-slate-400 p-4">Nenhuma peça com troca pendente.</p>`;
            }
        }

        function checkOverallStatus() {
            const finalizeButton = document.getElementById('btn-finalize-os');
            const pendingItems = (selectedOS.analise_previa || []).filter(item => item.veredito === 'TROCAR');

            if (pendingItems.length === 0) {
                finalizeButton.disabled = false;
                finalizeButton.classList.remove('opacity-50', 'grayscale', 'cursor-not-allowed');
            } else {
                finalizeButton.disabled = true;
                finalizeButton.classList.add('opacity-50', 'grayscale', 'cursor-not-allowed');
            }
        }
        
        function togglePendingView() {
            document.getElementById('pending-parts-list').classList.toggle('hidden');
        }

        function switchTab(btn, tabId) {
            document.querySelectorAll('.tab-button').forEach(b => {
                b.classList.remove('tab-active', 'text-slate-400');
                b.classList.add('text-slate-400');
            });
            btn.classList.add('tab-active');
            btn.classList.remove('text-slate-400');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        function updateSelectColor(el) {
            const val = el.value;
            el.className = 'w-full text-white text-[9px] font-black py-2 rounded-lg uppercase text-center outline-none'; // Reset
            if (val === 'NÃO INFORMADO') el.classList.add('bg-slate-400');
            else if (val === 'PEÇA OK') el.classList.add('bg-emerald-500');
            else if (val === 'RECONDICIONAR') el.classList.add('bg-yellow-500');
            else if (val === 'TROCAR') el.classList.add('bg-red-600');
        }

        async function handleFinalizeOS() {
            if (!selectedOS) return;
            if (!confirm("Confirmar fechamento da montagem? A OS será enviada para o Controle de Qualidade.")) return;

            const btn = document.getElementById('btn-finalize-os');
            const originalText = btn.innerText;
            
            // Bloqueia o botão para evitar cliques duplos
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            // Coleta os dados de balanceamento da Aba 4
            const balanceData = {};
            document.querySelectorAll('.balance-input').forEach(input => {
                const fieldName = input.getAttribute('data-field');
                balanceData[fieldName] = input.value || 'N/A';
            });

            const payload = {
                os_id: selectedOS.os_id,
                action: 'FINALIZE_ASSEMBLY', // Identificador opcional para o n8n
                balance_data: balanceData
            };

            try {
                const response = await fetch(API_ACTION, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert("✅ Montagem Finalizada! A OS agora está no setor de Qualidade.");
                    window.location.reload();
                } else {
                    const errorData = await response.json();
                    alert("❌ Erro ao finalizar: " + (errorData.message || "Servidor não respondeu corretamente."));
                    btn.disabled = false;
                    btn.innerText = originalText;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            } catch (error) {
                console.error("Erro no envio:", error);
                alert("❌ Falha de conexão com o servidor de produção.");
                btn.disabled = false;
                btn.innerText = originalText;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
